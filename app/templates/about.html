{% extends "base.html" %}
{% block title %}About{% endblock %}

{% block content %}
<section class="page-section">
  <h1 class="section-heading"><span class="num">01</span> About</h1>
  <div class="prose">
    {% for para in about %}
      <p>{{ para }}</p>
    {% endfor %}
  </div>
</section>

{% if honors %}
<section class="page-section">
  <h2 class="section-heading"><span class="num">01b</span> Honors &amp; Awards</h2>
  <ul class="bullets">
    {% for honor in honors %}<li>{{ honor }}</li>{% endfor %}
  </ul>
</section>
{% endif %}
{% endblock %}
