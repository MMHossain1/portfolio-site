{% extends "mh/base_mh.html" %}
{% block title %}Skills{% endblock %}

{% block content %}
<section class="page-section">
  <h1 class="section-heading"><span class="num">05</span> Skills</h1>
  <div class="skills">
    {% for group in skills %}
      <div class="skill-group">
        <h2 class="skill-cat">{{ group.category }}</h2>
        <ul class="tag-list">
          {% for item in group.entries %}<li class="tag">{{ item }}</li>{% endfor %}
        </ul>
      </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
